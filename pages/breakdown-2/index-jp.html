  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>

  <!-- NAV -->
  <nav class="site-nav" id="nav">
    <a href="/" class="nav-logo">Eri Adachi</a>
    <ul class="nav-menu">
      <li><a href="/index-jp.html#about">プロフィール</a></li>
      <li><a href="/pages/demoreel/index-jp.html">デモリール</a></li>
      <li><a href="/pages/bafta/index-jp.html">BAFTA</a></li>
      <li><a href="/pages/education/index-jp.html">教育活動</a></li>
      <li><a href="/pages/press/index-jp.html">プレス</a></li>
      <li><a href="/pages/breakdown-2/index-jp.html">ブレイクダウン</a></li>
    </ul>
    <div class="lang-switch" id="langToggle" role="group" aria-label="Switch language"
         data-en-url="/pages/breakdown-2/" data-ja-url="/pages/breakdown-2/index-jp.html">
      <button class="lang-option lang-opt-en" data-lang="en" aria-label="English">
        <img src="../../assets/flag-uk.png" alt="EN">
      </button>
      <button class="lang-option lang-opt-ja active" data-lang="ja" aria-label="日本語">
        <img src="../../assets/flag-jp.png" alt="JP">
      </button>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <header class="page-hero">
    <div class="wrap">
      <a href="/index-jp.html" class="back-btn">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <path d="M6 1L1 6L6 11M1 6H15" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        ホームへ戻る
      </a>
      <p class="page-num reveal">03 / 05</p>
      <h1 class="page-title reveal" data-d="1">ブレイクダウン</h1>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="page-content">
    <div class="wrap">
      <div class="breakdown-box reveal">
        <p class="section-tag centered">コンポジット ブレイクダウン</p>
        <h2 class="section-heading">お問い合わせ</h2>
        <p>
          業界関係者・制作プロダクション向けに、ショットブレイクダウンをリクエストに応じて公開しております。アクセスをご希望の方は直接お問い合わせください。
        </p>
        <a href="mailto:eribeeb@gmail.com" class="contact-email">
          eribeeb@gmail.com
        </a>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <span class="footer-copy">&copy; 2026 Eri Adachi</span>
    <span class="footer-right">シニアコンポジター &nbsp;·&nbsp; VFXアーティスト</span>
  </footer>

  <script>
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('is-scrolled', window.scrollY > 40);
    }, { passive: true });

    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('in-view'); observer.unobserve(e.target); }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    document.querySelectorAll('#langToggle .lang-option').forEach(btn => {
      btn.addEventListener('click', () => {
        const toggle = document.getElementById('langToggle');
        const url = btn.dataset.lang === 'en' ? toggle.dataset.enUrl : toggle.dataset.jaUrl;
        if (url) window.location.href = url;
      });
    });
  </script>

</body>
</html>
