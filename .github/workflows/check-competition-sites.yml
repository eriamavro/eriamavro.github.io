name: Check Competition Sites

on:
  schedule:
    - cron: "12 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check official competition pages
        run: node scripts/check_competitions.mjs

      - name: Commit updated watch status
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update competition watch status"
          file_pattern: competition-site/data/watch-status.json
